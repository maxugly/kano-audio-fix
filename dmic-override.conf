# Override: disable DMIC to prevent SOF DSP crash on Google Kano
# The DSP crashes when DMIC PCM devices (99, 100) are probed because
# the BIOS doesn't provide NHLT tables. This removes the DMIC capture
# device from the UCM profile so the ACP plugin never opens it.

SectionDevice."Mic" {
	Comment "Digital Microphone (DISABLED — crashes DSP)"

	Value {
		CapturePriority 0
		CapturePCM "hw:${CardId},999"
	}
}
