# Disable DMIC ALSA nodes (pcm99, pcm100) to prevent SOF DSP crash on Google Kano
# These PCM devices crash the DSP when probed because the BIOS doesn't provide NHLT tables

monitor.alsa.rules = [
  {
    matches = [
      {
        # Match capture nodes on DMIC PCM devices (99 = DMIC, 100 = DMIC16kHz)
        api.alsa.pcm.device = "99"
        api.alsa.pcm.stream = "capture"
      }
      {
        api.alsa.pcm.device = "100"
        api.alsa.pcm.stream = "capture"
      }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
]
